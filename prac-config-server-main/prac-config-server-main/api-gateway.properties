
# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Gateway Routes — Auth
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/gateway/auth/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1

# Gateway Routes — Delivery
spring.cloud.gateway.server.webmvc.routes[1].id=delivery-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://delivery-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/gateway/deliveries/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=1

# Gateway Routes — Tracking
spring.cloud.gateway.server.webmvc.routes[2].id=tracking-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://tracking-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/gateway/tracking/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=StripPrefix=1

# Gateway Routes — Admin
spring.cloud.gateway.server.webmvc.routes[3].id=admin-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://admin-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/gateway/admin/**
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=StripPrefix=1

# Swagger
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/gateway/auth-docs/v3/api-docs

springdoc.swagger-ui.urls[1].name=Delivery Service
springdoc.swagger-ui.urls[1].url=/gateway/delivery-docs/v3/api-docs

springdoc.swagger-ui.urls[2].name=Tracking Service
springdoc.swagger-ui.urls[2].url=/gateway/tracking-docs/v3/api-docs

springdoc.swagger-ui.urls[3].name=Admin Service
springdoc.swagger-ui.urls[3].url=/gateway/admin-docs/v3/api-docs
# Server
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health,info

jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

# API Docs Routes — strip 2 prefixes so /gateway/auth-docs → /v3/api-docs
spring.cloud.gateway.server.webmvc.routes[4].id=auth-service-docs
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://auth-service
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/gateway/auth-docs/**
spring.cloud.gateway.server.webmvc.routes[4].filters[0]=StripPrefix=2

spring.cloud.gateway.server.webmvc.routes[5].id=delivery-service-docs
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://delivery-service
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/gateway/delivery-docs/**
spring.cloud.gateway.server.webmvc.routes[5].filters[0]=StripPrefix=2

spring.cloud.gateway.server.webmvc.routes[6].id=tracking-service-docs
spring.cloud.gateway.server.webmvc.routes[6].uri=lb://tracking-service
spring.cloud.gateway.server.webmvc.routes[6].predicates[0]=Path=/gateway/tracking-docs/**
spring.cloud.gateway.server.webmvc.routes[6].filters[0]=StripPrefix=2

eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.client.registry-fetch-interval-seconds=5
