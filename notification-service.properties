
# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Server
server.port=8085

# Actuator
management.endpoints.web.exposure.include=health,info

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.client.registry-fetch-interval-seconds=5
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Tell Logback to track INFO level logs and higher for your code
logging.level.com.notification_service=INFO
# Zipkin
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0

# Define the physical file where the logs will be saved
logging.file.name=logs/notification-service.log

# Create a new daily file and keep the last 30 days of history
logging.logback.rollingpolicy.file-name-pattern=logs/notification-service-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-history=30
