

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/admin_db
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8084

# Actuator
management.endpoints.web.exposure.include=health,info

# JWT
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

# Feign
feign.client.config.delivery-service.url=http://localhost:8082
feign.client.config.delivery-service.connectTimeout=5000
feign.client.config.delivery-service.readTimeout=5000

eureka.client.initial-instance-info-replication-interval-seconds=5
eureka.client.registry-fetch-interval-seconds=5

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Enable SLF4J/Logback for the admin service
logging.level.com.admin_service=INFO

# Define the log file location and rolling policy
logging.file.name=logs/admin-service.log
logging.logback.rollingpolicy.file-name-pattern=logs/admin-service-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-history=30

# Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans


