server:
  port: 8083

app:
  upload:
    path: ./uploads/tracking

spring:
  application:
    name: tracking-service
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: file:./uploads/tracking
  datasource:
    url: jdbc:postgresql://postgres-tracking:5432/smartcourier?currentSchema=tracking
    username: postgres
    password: SmartCourier@2024
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: smartcourier
    password: smartcourier

eureka:
  instance:
    hostname: tracking-service
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,tracing
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
    brave:
      zipkin:
        url: http://zipkin:9411/api/v2/spans

feign:
  client:
    config:
      auth-service:
        url: http://auth-service:8081
      delivery-service:
        url: http://delivery-service:8082
